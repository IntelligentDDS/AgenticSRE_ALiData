<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#134e5e"/>
      <stop offset="100%" stop-color="#1e7f73"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#123447" flood-opacity="0.15"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#c2410c"/>
    </marker>
    <style>
      .title { font: 700 44px "Arial", "Noto Sans CJK SC", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 400 20px "Arial", "Noto Sans CJK SC", sans-serif; fill: #475569; }
      .section-title { font: 700 22px "Arial", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .section-sub { font: 400 15px "Arial", "Noto Sans CJK SC", sans-serif; fill: #64748b; }
      .label { font: 700 17px "Arial", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .small { font: 400 14px "Arial", "Noto Sans CJK SC", sans-serif; fill: #475569; }
      .tiny { font: 400 12px "Arial", "Noto Sans CJK SC", sans-serif; fill: #64748b; }
      .white-title { font: 700 25px "Arial", "Noto Sans CJK SC", sans-serif; fill: #ffffff; }
      .white { font: 400 15px "Arial", "Noto Sans CJK SC", sans-serif; fill: #e6fffb; }
      .pill-text { font: 700 13px "Arial", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .card { fill: #ffffff; stroke: #dbe7ef; stroke-width: 1.2; filter: url(#soft); }
      .panel { fill: rgba(255,255,255,0.88); stroke: #cbd5e1; stroke-width: 1.4; filter: url(#shadow); }
      .lane { fill: #ffffff; stroke: #d5e2ea; stroke-width: 1.2; }
      .chip { fill: #ecfeff; stroke: #99f6e4; stroke-width: 1; }
      .warn-chip { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; }
      .purple-chip { fill: #f5f3ff; stroke: #ddd6fe; stroke-width: 1; }
      .line { fill: none; stroke: #334155; stroke-width: 2.2; marker-end: url(#arrow); }
      .flow { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#arrowBlue); }
      .feedback { fill: none; stroke: #c2410c; stroke-width: 2.4; stroke-dasharray: 9 7; marker-end: url(#arrowOrange); }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="1800" height="1120" fill="url(#bg)"/>
  <rect x="42" y="34" width="1716" height="1052" rx="24" fill="#ffffff" opacity="0.54" stroke="#dbeafe"/>

  <text x="80" y="92" class="title">AgenticSRE 多智能体智能运维系统架构</text>
  <text x="80" y="126" class="subtitle">面向通算 K8s 与智算 vLLM 场景的“观测 - 协作诊断 - 质量闭环 - 安全修复 - 持续演化”一体化平台</text>
  <g transform="translate(1325 58)">
    <rect x="0" y="0" width="370" height="86" rx="16" fill="#0f172a" opacity="0.92"/>
    <text x="24" y="34" class="white-title">核心闭环</text>
    <text x="24" y="58" class="white">发现 → 假设 → 规划 → 调查</text>
    <text x="24" y="78" class="white">推理 → 验证 → 学习</text>
  </g>

  <!-- Managed environments -->
  <g transform="translate(70 180)">
    <rect class="panel" x="0" y="0" width="360" height="720" rx="18"/>
    <text x="28" y="42" class="section-title">被管环境与故障实验</text>
    <text x="28" y="70" class="section-sub">真实集群信号 + 可复现实验场景</text>

    <rect class="card" x="26" y="104" width="308" height="172" rx="14"/>
    <rect x="48" y="126" width="54" height="54" rx="13" fill="#e0f2fe"/>
    <path d="M60 154 h30 M75 139 v30 M62 142 l26 26 M88 142 l-26 26" stroke="#0369a1" stroke-width="4" stroke-linecap="round"/>
    <text x="118" y="142" class="label">通算 K8s 场景</text>
    <text x="118" y="170" class="small">DeathStarBench Social Network</text>
    <text x="118" y="196" class="small">CPU / Memory / Network / CrashLoop</text>
    <text x="118" y="222" class="small">17 个通算故障注入场景</text>

    <rect class="card" x="26" y="306" width="308" height="188" rx="14"/>
    <rect x="48" y="328" width="54" height="54" rx="13" fill="#fef3c7"/>
    <path d="M62 352 h28 M62 365 h28 M69 341 h14 a10 10 0 0 1 0 20 h-14z" fill="none" stroke="#b45309" stroke-width="4" stroke-linecap="round"/>
    <text x="118" y="344" class="label">智算 vLLM 场景</text>
    <text x="118" y="372" class="small">T4 推理服务 / 多节点验证</text>
    <text x="118" y="398" class="small">软件 / 驱动 / 网络 / OS 分层</text>
    <text x="118" y="424" class="small">27 个智算故障实验场景</text>
    <text x="118" y="450" class="tiny">默认 dry-run，凭据运行时注入</text>

    <rect class="card" x="26" y="524" width="308" height="150" rx="14"/>
    <text x="50" y="560" class="label">实验与评测</text>
    <text x="50" y="588" class="small">AIOpsLab Fault Lab</text>
    <text x="50" y="614" class="small">RCA 基准对比与端到端评分</text>
    <text x="50" y="640" class="small">复杂故障 / 级联 / 灰度故障</text>
  </g>

  <!-- Observability and tool layer -->
  <g transform="translate(485 180)">
    <rect class="panel" x="0" y="0" width="395" height="720" rx="18"/>
    <text x="28" y="42" class="section-title">观测与工具层</text>
    <text x="28" y="70" class="section-sub">统一接入多源证据和可执行工具</text>

    <g transform="translate(28 105)">
      <rect class="lane" x="0" y="0" width="338" height="74" rx="12"/>
      <circle cx="38" cy="37" r="20" fill="#dcfce7"/>
      <path d="M28 40 l8 8 l18 -22" fill="none" stroke="#15803d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="31" class="label">Prometheus</text>
      <text x="76" y="55" class="small">指标、告警、资源与业务时序</text>
    </g>
    <g transform="translate(28 195)">
      <rect class="lane" x="0" y="0" width="338" height="74" rx="12"/>
      <circle cx="38" cy="37" r="20" fill="#fee2e2"/>
      <path d="M28 29 h20 M28 38 h26 M28 47 h16" stroke="#b91c1c" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="31" class="label">Elasticsearch / Logs</text>
      <text x="76" y="55" class="small">错误日志、异常栈、服务上下文</text>
    </g>
    <g transform="translate(28 285)">
      <rect class="lane" x="0" y="0" width="338" height="74" rx="12"/>
      <circle cx="38" cy="37" r="20" fill="#e0e7ff"/>
      <path d="M27 46 c20 -28 31 28 50 0" fill="none" stroke="#4f46e5" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="31" class="label">Jaeger Trace</text>
      <text x="76" y="55" class="small">调用链、慢 span、依赖路径</text>
    </g>
    <g transform="translate(28 375)">
      <rect class="lane" x="0" y="0" width="338" height="74" rx="12"/>
      <circle cx="38" cy="37" r="20" fill="#f0fdfa"/>
      <path d="M25 50 h25 l-9 -12 h22 l-10 -14" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="31" class="label">Kubernetes / kubectl</text>
      <text x="76" y="55" class="small">Pod、事件、节点、变更与操作</text>
    </g>
    <g transform="translate(28 465)">
      <rect class="lane" x="0" y="0" width="338" height="74" rx="12"/>
      <circle cx="38" cy="37" r="20" fill="#fae8ff"/>
      <path d="M25 48 l16 -24 l12 18 l10 -10 l12 16" fill="none" stroke="#a21caf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="76" y="31" class="label">Anomaly / Graph RCA</text>
      <text x="76" y="55" class="small">异常检测、拓扑关联、根因定位</text>
    </g>
    <g transform="translate(28 574)">
      <rect class="warn-chip" x="0" y="0" width="338" height="86" rx="14"/>
      <text x="22" y="32" class="label">工具治理</text>
      <text x="22" y="58" class="small">Tool Registry、ActionStack、回滚保护</text>
    </g>
  </g>

  <!-- Central core -->
  <g transform="translate(930 168)">
    <rect x="0" y="0" width="520" height="748" rx="26" fill="url(#core)" filter="url(#shadow)"/>
    <text x="34" y="52" class="white-title">RCA 编排与多智能体协作核心</text>
    <text x="34" y="82" class="white">orchestrator/rca_engine.py · pipeline.py · daemon.py · session.py</text>

    <g transform="translate(34 116)">
      <rect x="0" y="0" width="452" height="86" rx="16" fill="#ffffff" opacity="0.14" stroke="#a7f3d0"/>
      <text x="22" y="34" class="white-title" font-size="20">协作策略选择</text>
      <text x="22" y="61" class="white">plan-execute · memory · ReAct · reflection</text>
    </g>

    <g transform="translate(34 232)">
      <rect x="0" y="0" width="452" height="116" rx="16" fill="#ffffff" opacity="0.96"/>
      <text x="22" y="34" class="label">五阶段诊断流水线</text>
      <g transform="translate(22 54)">
        <rect class="chip" x="0" y="0" width="75" height="36" rx="18"/><text class="pill-text" x="15" y="23">发现</text>
        <rect class="chip" x="86" y="0" width="75" height="36" rx="18"/><text class="pill-text" x="101" y="23">假设</text>
        <rect class="chip" x="172" y="0" width="75" height="36" rx="18"/><text class="pill-text" x="187" y="23">规划</text>
        <rect class="chip" x="258" y="0" width="75" height="36" rx="18"/><text class="pill-text" x="273" y="23">调查</text>
        <rect class="chip" x="344" y="0" width="75" height="36" rx="18"/><text class="pill-text" x="359" y="23">推理</text>
      </g>
    </g>

    <g transform="translate(34 378)">
      <rect x="0" y="0" width="452" height="202" rx="16" fill="#ffffff" opacity="0.96"/>
      <text x="22" y="34" class="label">专用智能体并行调查</text>
      <g transform="translate(22 58)">
        <rect class="purple-chip" x="0" y="0" width="126" height="38" rx="12"/><text class="pill-text" x="18" y="24">AlertAgent</text>
        <rect class="purple-chip" x="144" y="0" width="126" height="38" rx="12"/><text class="pill-text" x="161" y="24">MetricAgent</text>
        <rect class="purple-chip" x="288" y="0" width="126" height="38" rx="12"/><text class="pill-text" x="314" y="24">LogAgent</text>
        <rect class="purple-chip" x="0" y="52" width="126" height="38" rx="12"/><text class="pill-text" x="18" y="76">TraceAgent</text>
        <rect class="purple-chip" x="144" y="52" width="126" height="38" rx="12"/><text class="pill-text" x="161" y="76">EventAgent</text>
        <rect class="purple-chip" x="288" y="52" width="126" height="38" rx="12"/><text class="pill-text" x="304" y="76">ProfilingAgent</text>
        <rect class="chip" x="0" y="104" width="198" height="38" rx="12"/><text class="pill-text" x="22" y="128">Hypothesis / Planning</text>
        <rect class="chip" x="216" y="104" width="198" height="38" rx="12"/><text class="pill-text" x="238" y="128">Correlation / Judge</text>
      </g>
    </g>

    <g transform="translate(34 610)">
      <rect x="0" y="0" width="452" height="86" rx="16" fill="#ffffff" opacity="0.14" stroke="#a7f3d0"/>
      <text x="22" y="34" class="white-title" font-size="20">诊断闭环</text>
      <text x="22" y="61" class="white">Critic 反思 · 二次定向取证 · 故障类型校准 · HITL</text>
    </g>
  </g>

  <!-- Memory and governance -->
  <g transform="translate(1500 180)">
    <rect class="panel" x="0" y="0" width="260" height="720" rx="18"/>
    <text x="24" y="42" class="section-title">记忆、治理与演化</text>
    <text x="24" y="70" class="section-sub">让诊断结果可追溯、可纠偏、可成长</text>

    <rect class="card" x="22" y="108" width="216" height="104" rx="14"/>
    <text x="42" y="142" class="label">FaultContextStore</text>
    <text x="42" y="169" class="small">规则 / 案例 / 证据上下文</text>
    <text x="42" y="193" class="tiny">ChromaDB + JSON fallback</text>

    <rect class="card" x="22" y="238" width="216" height="104" rx="14"/>
    <text x="42" y="272" class="label">RCAJudge</text>
    <text x="42" y="299" class="small">质量评分、证据门禁</text>
    <text x="42" y="323" class="tiny">低质量结果进入复审</text>

    <rect class="card" x="22" y="368" width="216" height="104" rx="14"/>
    <text x="42" y="402" class="label">Human-in-the-Loop</text>
    <text x="42" y="429" class="small">专家确认、拒绝、纠错</text>
    <text x="42" y="453" class="tiny">人工反馈转化为监督样本</text>

    <rect class="card" x="22" y="498" width="216" height="104" rx="14"/>
    <text x="42" y="532" class="label">EvolutionTracker</text>
    <text x="42" y="559" class="small">演化快照、趋势分析</text>
    <text x="42" y="583" class="tiny">支撑准确率提升验证</text>

    <rect class="warn-chip" x="22" y="630" width="216" height="58" rx="14"/>
    <text x="42" y="654" class="label">治理原则</text>
    <text x="42" y="677" class="tiny">可解释 · 可审计 · 可回滚</text>
  </g>

  <!-- Entry layer -->
  <g transform="translate(480 945)">
    <rect class="panel" x="0" y="0" width="860" height="100" rx="18"/>
    <text x="28" y="38" class="section-title">Web Dashboard / API / SSE</text>
    <text x="28" y="66" class="section-sub">FastAPI 控制台统一承载：指标监控、调用链、RCA 实时流、通算/智算故障实验、HITL 与演化报表</text>
    <g transform="translate(650 24)">
      <rect class="chip" x="0" y="0" width="78" height="34" rx="17"/><text class="pill-text" x="20" y="22">API</text>
      <rect class="chip" x="92" y="0" width="78" height="34" rx="17"/><text class="pill-text" x="112" y="22">SSE</text>
    </g>
  </g>

  <!-- Remediation layer -->
  <g transform="translate(920 948)">
    <rect x="0" y="-818" width="0" height="0" fill="none"/>
  </g>
  <g transform="translate(70 934)">
    <rect class="panel" x="0" y="0" width="360" height="110" rx="18"/>
    <text x="28" y="38" class="section-title">安全修复出口</text>
    <text x="28" y="66" class="section-sub">RemediationAgent 生成建议</text>
    <text x="28" y="91" class="section-sub">审批后执行，ActionStack 记录回滚</text>
  </g>

  <!-- Flow arrows -->
  <path class="flow" d="M430 540 C460 540 458 540 485 540"/>
  <path class="flow" d="M880 540 C905 540 905 540 930 540"/>
  <path class="flow" d="M1450 540 C1474 540 1474 540 1500 540"/>
  <path class="line" d="M1270 916 C1250 950 1230 958 1160 958"/>
  <path class="line" d="M930 742 C820 850 590 886 430 984"/>
  <path class="feedback" d="M1500 700 C1300 850 1090 920 860 945"/>
  <path class="feedback" d="M1550 180 C1450 118 1300 112 1180 168"/>
  <path class="flow" d="M910 996 C840 996 720 996 480 996"/>

  <!-- Legend -->
  <g transform="translate(80 1044)">
    <line x1="0" y1="0" x2="42" y2="0" class="flow"/>
    <text x="56" y="5" class="tiny">主数据流 / 诊断证据流</text>
    <line x1="228" y1="0" x2="270" y2="0" class="feedback"/>
    <text x="284" y="5" class="tiny">质量反馈 / 记忆演化回路</text>
  </g>

  <text x="1180" y="1070" class="tiny">AgenticSRE architecture · Huawei 2012 Lab SOW prototype · mapped from local codebase</text>
</svg>
