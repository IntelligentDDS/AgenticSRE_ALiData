      <rect class="chip-orange" x="612" y="0" width="150" height="38" rx="12"/><text class="pill-text" x="642" y="24">回滚验证</text>
    </g>
  </g>

  <!-- Orthogonal arrows, kept in gutters -->
  <!-- Access to core -->
  <path class="ctrl" d="M960 259 L960 285 L1200 285 L1200 305"/>
  <!-- Environment to tools -->
  <path class="data" d="M440 612 L470 612 L470 612 L500 612"/>
  <!-- Tools to core -->
  <path class="data" d="M890 612 L920 612 L920 612 L950 612"/>
  <!-- Core to memory -->
  <path class="data" d="M1450 612 L1480 612 L1480 612 L1510 612"/>
  <!-- Tools to agents, routed through lower gutter -->
  <path class="ctrl" d="M890 885 L918 885 L918 1018 L950 1018"/>
  <!-- Agents to core, routed on center line -->
  <path class="data" d="M1200 948 L1200 925"/>
  <!-- Core to remediation, routed beside the core to avoid the agent panel -->
  <path class="ctrl" d="M950 835 L930 835 L930 966 L890 966"/>
  <!-- Remediation back to environment -->
  <path class="ctrl" d="M80 1040 L52 1040 L52 612 L80 612"/>
  <!-- Memory feedback to core, top gutter -->
  <path class="learn" d="M1510 360 L1475 360 L1475 282 L1280 282 L1280 305"/>
  <!-- HITL/evolution feedback is represented by the upper dashed loop into the core. -->
  <!-- Results to dashboard -->
  <path class="ctrl" d="M1340 925 L1340 948"/>

  <!-- Flow labels -->
  <g transform="translate(454 586)">
    <rect x="0" y="0" width="92" height="24" rx="12" fill="#ffffff" stroke="#99f6e4"/>
