<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Chat Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f7fa; padding: 20px; }
.chat-box { max-width: 800px; margin: 0 auto; background: #fff; border: 1px solid #e2e6ec; border-radius: 8px; display: flex; flex-direction: column; height: 80vh; min-height: 500px; }
.chat-header { padding: 12px 16px; border-bottom: 1px solid #e2e6ec; background: #f5f7fa; font-size: 16px; font-weight: 600; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
.msg { margin-bottom: 10px; display: flex; gap: 8px; max-width: 90%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
.msg.bot { margin-right: auto; }
.msg .bubble { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
.msg.user .bubble { background: #6366f1; color: #fff; border-radius: 10px 4px 10px 10px; }
.msg.bot .bubble { background: #fff; border: 1px solid #e2e6ec; border-radius: 4px 10px 10px 10px; color: #1a1d27; }
.chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e2e6ec; background: #f5f7fa; }
.chat-input textarea { flex: 1; padding: 12px; border: 1px solid #e2e6ec; border-radius: 6px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 60px; max-height: 150px; outline: none; }
.chat-input textarea:focus { border-color: #6366f1; }
.chat-input button { padding: 10px 24px; background: #6366f1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; align-self: flex-end; }
.chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading { color: #8b91a0; font-style: italic; padding: 10px; }
</style>
</head>
<body>
<div class="chat-box">
    <div class="chat-header">OpsLLM-14B 智能运维助手</div>
    <div class="chat-messages" id="msgs"></div>
    <div class="chat-input">
        <textarea id="input" placeholder="输入问题，按 Enter 发送..." rows="3"></textarea>
        <button id="sendBtn" onclick="send()">发送</button>
    </div>
</div>
<script>
async function send() {
    var input = document.getElementById('input');
    var btn = document.getElementById('sendBtn');
    var msgs = document.getElementById('msgs');
    var text = input.value.trim();
    if (!text) return;

    input.value = '';
    btn.disabled = true;
    btn.textContent = '...';

    // Add user message
    var userDiv = document.createElement('div');
    userDiv.className = 'msg user';
    userDiv.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div>';
    msgs.appendChild(userDiv);

    // Add loading
    var loadDiv = document.createElement('div');
    loadDiv.className = 'loading';
    loadDiv.textContent = '思考中...';
    msgs.appendChild(loadDiv);
    msgs.scrollTop = msgs.scrollHeight;

    try {
        var resp = await fetch('/api/model/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, session_id: 'default', stream: false})
        });
        var data = await resp.json();
        loadDiv.remove();

        var botDiv = document.createElement('div');
        botDiv.className = 'msg bot';
        var reply = data.response || data.detail || '无回复';
        botDiv.innerHTML = '<div class="bubble">' + escapeHtml(reply) + '</div>';
        msgs.appendChild(botDiv);
    } catch(e) {
        loadDiv.remove();
        var errDiv = document.createElement('div');
        errDiv.className = 'msg bot';
        errDiv.innerHTML = '<div class="bubble">请求失败: ' + escapeHtml(e.message) + '</div>';
        msgs.appendChild(errDiv);
    }

    btn.disabled = false;
    btn.textContent = '发送';
    msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

document.getElementById('input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});
</script>
</body>
</html>
